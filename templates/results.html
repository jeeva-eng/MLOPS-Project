<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wine Quality Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="result-page">

<div class="result-card">
    <h1>🍷 Wine Quality Prediction</h1>
    <p class="subtitle"> Model Analysis Result</p>

    <div class="score">{{ prediction }}</div>

    {% if prediction|int >= 7 %}
        <p class="quality good">⭐ Excellent Quality Wine</p>
    {% elif prediction|int >= 5 %}
        <p class="quality average">🍷 Moderate Quality Wine</p>
    {% else %}
        <p class="quality poor">⚠️ Low Quality Wine</p>
    {% endif %}

    <a href="/" class="btn">Predict Again</a>
</div>

</body>
</html>
